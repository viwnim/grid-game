<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Memory Game</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .item {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 2px;
            width: 45px;
            height: 45px;
            border: 1px solid white;
            padding: 2px;
            background-color: black;
        }

        .circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: black;
            border: 1px solid white;
            box-sizing: border-box;
        }

        /* Active State */
        .item.active {
            background-color: blue;
        }
        .item.active .circle {
            background-color: blue;
        }

        #controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        input {
            padding: 10px;
            font-size: 1.2rem;
            width: 60px;
            text-align: center;
            text-transform: uppercase;
            border-radius: 4px;
            border: none;
        }

        button {
            padding: 10px 30px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }

        #feedback {
            font-size: 2rem;
            height: 2rem;
        }

        .correct { color: #4CAF50; }
        .wrong { color: #f44336; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="row" id="top-row"></div>
        <div class="row" id="bottom-row"></div>
    </div>

    <div id="controls">
        <div id="feedback"></div>
        <input type="text" id="answer-input" maxlength="1" placeholder="?">
        <button id="go-btn">GO</button>
    </div>

    <script>
        const topRowLetters = "ABCDEFGHIJKLMN".split("");
        const bottomRowLetters = "OPQRSTUVWXYZ12".split("");
        const allLetters = [...topRowLetters, ...bottomRowLetters];
        
        const topRowEl = document.getElementById('top-row');
        const bottomRowEl = document.getElementById('bottom-row');
        const inputEl = document.getElementById('answer-input');
        const feedbackEl = document.getElementById('feedback');
        const goBtn = document.getElementById('go-btn');

        let currentTarget = "";

        // Build the grid items
        function createRow(container, letters) {
            letters.forEach(letter => {
                const item = document.createElement('div');
                item.classList.add('item');
                item.id = `item-${letter}`;
                
                // Create the 3x3 circles
                for (let i = 0; i < 9; i++) {
                    const circle = document.createElement('div');
                    circle.classList.add('circle');
                    item.appendChild(circle);
                }
                container.appendChild(item);
            });
        }

        createRow(topRowEl, topRowLetters);
        createRow(bottomRowEl, bottomRowLetters);

        function startGame() {
            // Reset UI
            document.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
            feedbackEl.textContent = "";
            inputEl.value = "";
            inputEl.focus();

            // Pick random letter
            currentTarget = allLetters[Math.floor(Math.random() * allLetters.length)];
            
            // Light up the item
            document.getElementById(`item-${currentTarget}`).classList.add('active');
        }

        function checkAnswer() {
            const userAnswer = inputEl.value.toUpperCase();
            if (!userAnswer) return;

            if (userAnswer === currentTarget) {
                feedbackEl.textContent = "✔";
                feedbackEl.className = "correct";
                // Auto-start next round after a short delay
                setTimeout(startGame, 1000);
            } else {
                feedbackEl.textContent = "✘";
                feedbackEl.className = "wrong";
            }
        }

        goBtn.addEventListener('click', startGame);

        inputEl.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });
    </script>
</body>
