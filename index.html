<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Game: NUM vs LET</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Mode Toggle Styling */
        #mode-selector {
            margin-bottom: 30px;
            display: flex;
            background: #2a2a2a;
            padding: 5px;
            border-radius: 12px;
            gap: 5px;
        }

        .mode-btn {
            padding: 10px 25px;
            cursor: pointer;
            background: transparent;
            border: none;
            color: #888;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.2s;
        }

        .mode-btn.active {
            background: #007bff;
            color: white;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
        }

        #game-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 40px;
        }

        .row {
            display: flex;
            gap: 12px;
        }

        .item {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 2px;
            width: 48px;
            height: 48px;
            border: 1px solid white;
            padding: 3px;
            background-color: black;
        }

        .circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: black;
            border: 1px solid #444;
            box-sizing: border-box;
        }

        /* Active State */
        .item.active { background-color: blue; border-color: #00ffff; }
        .item.active .circle { background-color: blue; border-color: white; }

        #controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        input {
            padding: 15px;
            font-size: 2rem;
            width: 100px;
            text-align: center;
            text-transform: uppercase;
            border-radius: 12px;
            border: 2px solid #444;
            background: #fff;
            color: #000;
            outline: none;
        }
