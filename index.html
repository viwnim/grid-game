<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Pro: Match Order Debugger</title>
    <style>
        :root { --bg: #121212; --sidebar: #1e1e1e; --accent: #007bff; --red: #ff4d4d; --green: #28a745; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 180px; background: var(--sidebar); display: flex; flex-direction: column; padding: 20px; border-right: 1px solid #333; flex-shrink: 0; }
        .nav-btn { padding: 12px; margin-bottom: 10px; cursor: pointer; background: #2a2a2a; border: none; color: #888; border-radius: 6px; font-weight: bold; text-align: left; }
        .nav-btn.active { background: var(--accent); color: white; }
        
        .toggle-wrap { margin-top: auto; padding-top: 20px; border-top: 1px solid #333; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; vertical-align: middle; margin-right: 8px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 40px; }
        #hud-area { height: 80px; text-align: center; }
        #hearts-container { display: flex; gap: 8px; font-size: 1.8rem; margin-bottom: 5px; justify-content: center; }
        .heart { color: var(--red); }
        .heart.lost { color: #333; }

        #game-container { display: flex; flex-direction: column; gap: 25px; margin-bottom: 30px; }
        .row { display: flex; gap: 8px; }
        .item { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; width: 45px; height: 45px; border: 1px solid white; padding: 3px; background: black; cursor: pointer; position: relative; }
        .item:nth-child(4), .item:nth-child(10) { margin-right: 45px; }

        .train-label { position: absolute; font-size: 0.7rem; color: var(--accent); width: 100%; text-align: center; font-weight: bold; pointer-events: none; opacity: 0; }
        .top-label { top: -22px; }
        .bot-label { bottom: -22px; }
        body.training-on .train-label { opacity: 1; }

        .circle { border-radius: 50%; background: black; border: 1px solid #333; width: 100%; height: 100%; pointer-events: none; }
        #controls { display: flex; flex-direction: column; align-items: center; }
        input#answer-input { padding: 10px; font-size: 1.5rem; width: 220px; text-align: center; border-radius: 8px; border: 2px solid #444; background: #222; color: white; margin-bottom: 15px; text-transform: uppercase; }
        #start-btn { background: var(--green); color: white; font-size: 1.1rem; padding: 12px 60px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; }
        
        #result-panel { margin-top: 15px; padding: 15px; border-radius: 10px; background: #1e1e1e; border: 2px solid #444; text-align: center; width: 450px; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="training-on">

    <div id="sidebar">
        <h2 style="font-size: 0.8rem; color: #555; margin-bottom: 15px;">MODES</h2>
        <button id="nav-LOCATION" class="nav-btn active" onclick="switchMode('LOCATION')">LOCATION</button>
        <button id="nav-GAME" class="nav-btn" onclick="switchMode('GAME')">GAME</button>
        <button id="nav-SEQUENCE" class="nav-btn" onclick="switchMode('SEQUENCE')">SEQUENCE</button>
        
        <div class="toggle-wrap">
            <label class="switch">
                <input type="checkbox" id="train-toggle" checked onchange="toggleTraining()">
                <span class="slider"></span>
            </label>
            <span style="font-size: 0.8rem; font-weight: bold; color: #888;">TRAINING</span>
        </div>
    </div>

    <div id="main-content">
        <div id="hud-area">
            <div id="hearts-container" class="hidden"></div>
            <div id="timer-display" class="hidden">TIME: <span id="timer" style="color:white; font-weight:bold;">90</span>s</div>
        </div>

        <div id="loc-subnav" style="margin-bottom: 30px;">
            <button id="btn-let" onclick="setLocType('LET')" style="background:var(--accent); color:white; border:none; padding:5px 12px; border-radius:4px; cursor:pointer;">LET</button>
            <button id="btn-num" onclick="setLocType('NUM')" style="background:#444; color:white; border:none; padding:5px 12px; border-radius:4px; cursor:pointer;">NUM</button>
        </div>

        <div id="game-container">
            <div class="row" id="top-row"></div>
            <div class="row" id="bottom-row"></div>
        </div>

        <div id="controls">
            <div id="feedback" style="font-size: 2rem; height: 2.5rem; font-weight: bold; margin-bottom: 5px;"></div>
            <input type="text" id="answer-input" placeholder="?">
            <button id="start-btn" class="hidden" onclick="initCurrentMode()">START</button>
        </div>

        <div id="result-panel" class="hidden">
            <div id="res-title" style="font-size: 1.3rem; font-weight: bold; margin-bottom: 5px;"></div>
            <div id="res-detail" style="margin-bottom:10px; font-family: monospace; font-size: 0.85rem; line-height: 1.4;"></div>
            <button style="background:var(--accent); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;" onclick="initCurrentMode()">NEW GAME</button>
            <button style="background:#444; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;" onclick="showAllColors()">REVEAL</button>
        </div>
    </div>

    <script>
        const lettersTop = ["A","B","C","D","E","F","G","H","I","J","K","L","M","N"];
        const lettersBottom = ["O","P","Q","R","S","T","U","V","W","X","Y","Z","1","2"];
        const colorPairs = ['s-yellow', 's-red', 's-green', 's-purple', 's-blue', 'b-red-d-green', 'b-red-d-yellow', 'b-blue-d-green', 'b-purple-d-blue', 'b-green-d-yellow', 'b-green-d-red', 'b-yellow-d-blue', 'b-yellow-d-green', 'b-purple-d-yellow'];

        let currentMode = 'LOCATION', locType = 'LET', currentTarget = "", timer = 90, lives = 5, matchesFound = 0, gameActive = false, firstCard = null, awaitingReset = false, interval = null, correctSequence = "";

        function buildGrid() {
            const top = document.getElementById('top-row'), bot = document.getElementById('bottom-row');
            top.innerHTML = ''; bot.innerHTML = '';
            lettersTop.forEach((l, i) => top.appendChild(createItem(l, i + 1, 'top-label')));
            lettersBottom.forEach((l, i) => bot.appendChild(createItem(l, i + 1, 'bot-label')));
        }

        function createItem(l, num, labelClass) {
            const div = document.createElement('div');
            div.className = 'item'; div.id = 'item-' + l;
            const label = document.createElement('div');
            label.className = 'train-label ' + labelClass;
            label.innerText = locType === 'LET' ? l : num;
            div.appendChild(label);
            for(let j=0; j<9; j++) div.appendChild(document.createElement('div')).className = 'circle';
            div.onclick = () => handleItemClick(div);
            return div;
        }

        function applyColor(item, type, isVisible) {
            const circles = item.querySelectorAll('.circle');
            circles.forEach(c => { c.style.background = 'black'; c.style.borderColor = isVisible ? '#333' : '#1a1a1a'; });
            if (!isVisible || !type) return;
            if (type.startsWith('s-')) {
                const c = type.split('-')[1];
                circles.forEach(circle => { circle.style.background = c; circle.style.borderColor = 'white'; });
            } else {
                const p = type.split('-');
                circles.forEach((circle, i) => { 
                    if(i === 4) { circle.style.background = p[3]; circle.style.borderColor = 'white'; }
                    else { circle.style.background = p[1]; circle.style.borderColor = 'rgba(255,255,255,0.3)'; }
                });
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.id === 'nav-' + mode));
            document.getElementById('loc-subnav').classList.toggle('hidden', mode !== 'LOCATION');
            document.getElementById('start-btn').classList.toggle('hidden', mode === 'LOCATION');
            document.getElementById('hearts-container').classList.toggle('hidden', mode === 'LOCATION');
            document.getElementById('timer-display').classList.toggle('hidden', mode !== 'GAME');
            document.getElementById('result-panel').classList.add('hidden');
            const inp = document.getElementById('answer-input');
            inp.placeholder = (mode === 'SEQUENCE') ? "6 LETTERS" : "?";
            inp.style.width = (mode === 'SEQUENCE') ? "220px" : "80px";
            resetBoard();
            if(mode === 'LOCATION') startLocationRound();
        }

        function initCurrentMode() {
            document.getElementById('result-panel').classList.add('hidden');
            document.getElementById('feedback').innerText = "";
            if (currentMode === 'GAME') initGameMode();
            else if (currentMode === 'SEQUENCE') initSequenceMode();
        }

        function initSequenceMode() {
            gameActive = false; clearInterval(interval);
            const shuffled = [...colorPairs, ...colorPairs].sort(() => Math.random() - 0.5);
            const all = [...lettersTop, ...lettersBottom];
            
            all.forEach((l, i) => {
                const item = document.getElementById('item-' + l);
                item.classList.remove('invisible');
                item.dataset.color = shuffled[i];
                applyColor(item, shuffled[i], true);
            });

            // SCAN LOGIC
            const history = {}; // Maps color string to the first letter it was found at
            const orderedMatches = []; // List of pairs in order finalized
            const secondOccurrences = []; // Just the letters for the answer

            console.clear();
            console.log("%c--- NEW SEQUENCE SCAN (Col 1-14) ---", "color: #007bff; font-weight: bold;");

            for (let i = 0; i < 14; i++) {
                const colPair = [lettersTop[i], lettersBottom[i]];
                colPair.forEach(letter => {
                    const color = document.getElementById('item-' + letter).dataset.color;
                    if (history[color]) {
                        // Found the second one!
                        orderedMatches.push({pair: `${history[color]}-${letter}`, finalizedAt: letter});
                        secondOccurrences.push(letter);
                        console.log(`Match Found: ${history[color]} and ${letter} (Finalized at ${letter})`);
                    } else {
                        // First time seeing this color
                        history[color] = letter;
                    }
                });
            }

            correctSequence = secondOccurrences.slice(0, 6).join("");
            
            console.log("%cALL 14 PAIRS IN SCAN ORDER:", "color: #28a745; font-weight: bold;");
            console.table(orderedMatches);
            console.log("%cCORRECT 6-LETTER SEQUENCE:", "background: #222; color: #ffd700; padding: 5px;", correctSequence);

            document.getElementById('start-btn').classList.add('hidden');
        }

        function handleItemClick(item) {
            if (currentMode === 'LOCATION' || item.classList.contains('invisible')) return;
            if (!gameActive && currentMode !== 'LOCATION') {
                gameActive = true;
                if (currentMode === 'GAME') startTimer();
                hideAllColors();
                applyColor(item, item.dataset.color, true);
            }
            if (currentMode === 'SEQUENCE') return;
            if (awaitingReset) { hideAllColors(); awaitingReset = false; return; }
            if (item === firstCard) return;
            applyColor(item, item.dataset.color, true);
            if (!firstCard) { firstCard = item; }
            else {
                if (firstCard.dataset.color === item.dataset.color) {
                    const p = [firstCard, item];
                    setTimeout(() => { p.forEach(c => c.classList.add('invisible')); matchesFound++; if(matchesFound === 14) endGame(true); }, 400);
                    firstCard = null;
                } else {
                    lives--; updateHearts(); awaitingReset = true; showAllColors();
                    if(lives <= 0) endGame(false); firstCard = null;
                }
            }
        }

        function checkSequence() {
            const val = document.getElementById('answer-input').value.toUpperCase().trim();
            const panel = document.getElementById('result-panel');
            panel.classList.remove('hidden');
            if (val === correctSequence) {
                document.getElementById('res-title').innerHTML = "WINNER! 🏆";
                document.getElementById('res-detail').innerHTML = "All 6 matches correct.";
                panel.style.borderColor = "var(--green)";
            } else {
                document.getElementById('res-title').innerHTML = "WRONG ❌";
                document.getElementById('res-detail').innerHTML = `Expected: <b style="color:var(--accent)">${correctSequence}</b> | Got: <b style="color:var(--red)">${val || 'None'}</b><br><span style="font-size:0.7rem; color:#888;">Matches identified in order: ${correctSequence}...</span>`;
                panel.style.borderColor = "var(--red)";
            }
            gameActive = false;
        }

        function endGame(win) {
            gameActive = false; clearInterval(interval);
            const panel = document.getElementById('result-panel'); panel.classList.remove('hidden');
            if (win) {
                document.getElementById('res-title').innerHTML = "WINNER! 🏆";
                document.getElementById('res-detail').innerHTML = "Score: " + Math.round(1000 * (timer / 90) + (50 * lives));
                panel.style.borderColor = "var(--green)";
            } else {
                document.getElementById('res-title').innerHTML = "GAME OVER 💀";
                document.getElementById('res-detail').innerHTML = "Try again!";
                panel.style.borderColor = "var(--red)";
            }
        }

        function showAllColors() { document.querySelectorAll('.item').forEach(i => applyColor(i, i.dataset.color, true)); }
        function hideAllColors() { document.querySelectorAll('.item').forEach(i => applyColor(i, '', false)); }
        function updateHUD() { document.getElementById('timer').innerText = timer; }
        function updateHearts() {
            const c = document.getElementById('hearts-container'); c.innerHTML = '';
            for(let i=0; i<5; i++) {
                const s = document.createElement('span'); s.className = i < lives ? 'heart' : 'heart lost';
                s.innerHTML = '❤'; c.appendChild(s);
            }
        }
        function startTimer() { interval = setInterval(() => { timer--; updateHUD(); if(timer <= 0) endGame(false); }, 1000); }
        function resetBoard() { clearInterval(interval); document.querySelectorAll('.item').forEach(i => { i.classList.remove('invisible', 'active-loc'); applyColor(i, '', false); }); }
        
        function initGameMode() {
            timer = 90; lives = 5; matchesFound = 0; gameActive = false; awaitingReset = false;
            clearInterval(interval); updateHUD(); updateHearts();
            const s = [...colorPairs, ...colorPairs].sort(() => Math.random() - 0.5);
            const all = [...lettersTop, ...lettersBottom];
            all.forEach((l, i) => { const item = document.getElementById('item-'+l); item.classList.remove('invisible'); item.dataset.color = s[i]; applyColor(item, s[i], true); });
            document.getElementById('start-btn').classList.add('hidden');
        }
        function startLocationRound() { resetBoard(); currentTarget = [...lettersTop, ...lettersBottom][Math.floor(Math.random()*28)]; document.getElementById('item-'+currentTarget).classList.add('active-loc'); document.getElementById('answer-input').focus(); }
        function setLocType(t) { locType = t; buildGrid(); switchMode('LOCATION'); }
        function toggleTraining() { document.body.classList.toggle('training-on', document.getElementById('train-toggle').checked); }

        document.getElementById('answer-input').onkeyup = (e) => {
            if(e.key === 'Enter') {
                if (currentMode === 'SEQUENCE') checkSequence();
                else {
                    const v = e.target.value.toUpperCase().trim();
                    const n = lettersTop.includes(currentTarget) ? lettersTop.indexOf(currentTarget)+1 : lettersBottom.indexOf(currentTarget)+1;
                    const isCorrect = locType === 'LET' ? v === currentTarget : v === n.toString();
                    const fb = document.getElementById('feedback'); fb.innerText = isCorrect ? "✔" : "✘"; fb.className = isCorrect ? "correct" : "wrong";
                    if(isCorrect) setTimeout(startLocationRound, 600);
                }
                e.target.value = "";
            }
        };

        buildGrid();
        switchMode('LOCATION');
    </script>
</body>
</html>
