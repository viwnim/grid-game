<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Pro: Master Trainer</title>
    <style>
        :root { --bg: #121212; --sidebar: #1e1e1e; --accent: #007bff; --red: #ff4d4d; --green: #28a745; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 180px; background: var(--sidebar); display: flex; flex-direction: column; padding: 20px; border-right: 1px solid #333; flex-shrink: 0; }
        .nav-btn { padding: 12px; margin-bottom: 10px; cursor: pointer; background: #2a2a2a; border: none; color: #888; border-radius: 6px; font-weight: bold; text-align: left; transition: 0.2s; }
        .nav-btn.active { background: var(--accent); color: white; }
        
        .toggle-wrap { margin-top: auto; padding-top: 10px; border-top: 1px solid #333; }
        .toggle-item { display: flex; align-items: center; margin-bottom: 15px; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; vertical-align: middle; margin-right: 8px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding-top: 20px; overflow-y: auto; }
        #hud-area { height: 80px; text-align: center; width: 100%; }
        
        #game-container { display: flex; flex-direction: column; gap: 25px; margin-bottom: 25px; }
        .row { display: flex; gap: 8px; }
        .item { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; width: 45px; height: 45px; border: 1px solid white; padding: 3px; background: black; position: relative; cursor: pointer; }
        .item:nth-child(4), .item:nth-child(10) { margin-right: 45px; }
        
        .train-label { position: absolute; font-size: 0.7rem; color: var(--accent); width: 100%; text-align: center; font-weight: bold; opacity: 0; pointer-events: none; }
        .top-label { top: -22px; }
        .bot-label { bottom: -22px; }
        body.training-on .train-label { opacity: 1; }

        .circle { border-radius: 50%; background: black; width: 100%; height: 100%; border: 1px solid transparent; box-sizing: border-box; pointer-events: none; }
        body.circle-borders .circle { border: 1px solid white; }
        .active-loc .circle { background: blue !important; border-color: white !important; }

        #controls { display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; }
        input#answer-input { padding: 10px; font-size: 1.5rem; width: 150px; text-align: center; border-radius: 8px; border: 2px solid #444; background: #222; color: white; text-transform: uppercase; }
        
        #loc-stats-container { background: #1e1e1e; border: 1px solid #333; padding: 10px; border-radius: 8px; width: 320px; margin-top: 10px; }
        .stats-table { width: 100%; border-collapse: collapse; font-family: monospace; font-size: 0.8rem; }
        .stats-table th { text-align: left; color: #555; border-bottom: 1px solid #333; }
        .stats-table td { padding: 3px; border-bottom: 1px solid #252525; }
        .weak-link { color: var(--red); font-weight: bold; }
        
        .heart { color: var(--red); font-size: 1.5rem; margin: 0 2px; }
        .heart.lost { color: #333; }
        .hidden { display: none !important; }
        .matched { opacity: 0 !important; pointer-events: none !important; }
    </style>
</head>
<body class="training-on circle-borders">

    <div id="sidebar">
        <h2 style="font-size: 0.8rem; color: #555; margin-bottom: 15px;">MODES</h2>
        <button id="nav-LOCATION" class="nav-btn active" onclick="switchMode('LOCATION')">LOCATION</button>
        <button id="nav-GAME" class="nav-btn" onclick="switchMode('GAME')">GAME</button>
        <button id="nav-SEQUENCE" class="nav-btn" onclick="switchMode('SEQUENCE')">SEQUENCE</button>
        
        <div class="toggle-wrap">
            <div class="toggle-item">
                <label class="switch"><input type="checkbox" id="train-toggle" checked onchange="toggleSetting('training-on', this)"><span class="slider"></span></label>
                <span style="font-size: 0.7rem;">Training</span>
            </div>
            <div class="toggle-item">
                <label class="switch"><input type="checkbox" id="border-toggle" checked onchange="toggleSetting('circle-borders', this)"><span class="slider"></span></label>
                <span style="font-size: 0.7rem;">Borders</span>
            </div>
        </div>
    </div>

    <div id="main-content">
        <div id="hud-area">
            <div id="hearts-container"></div>
            <div id="stats-display" style="font-family: monospace; color: #aaa;"></div>
        </div>

        <div id="game-container">
            <div class="row" id="top-row"></div>
            <div class="row" id="bottom-row"></div>
        </div>

        <div id="controls">
            <div id="feedback" style="font-size: 1.2rem; height: 1.5rem; margin-bottom: 5px;"></div>
            <input type="text" id="answer-input" placeholder="?" autocomplete="off">
            <div style="margin-top:10px;">
                <button id="start-btn" onclick="initMode()" style="background:var(--green); color:white; border:none; padding:8px 20px; border-radius:4px; cursor:pointer; font-weight:bold;">START</button>
                <button id="reset-btn" class="hidden" onclick="initMode()" style="background:var(--red); color:white; border:none; padding:8px 20px; border-radius:4px; cursor:pointer; font-weight:bold;">RESTART</button>
            </div>
        </div>

        <div id="loc-stats-container">
            <div style="font-size: 0.7rem; font-weight: bold; color: var(--accent); margin-bottom: 8px;">SLOWEST 13 (5+ SAMPLES)</div>
            <table class="stats-table">
                <thead><tr><th>CHAR</th><th>AVG TIME</th><th>HITS</th></tr></thead>
                <tbody id="stats-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const lettersTop = ["A","B","C","D","E","F","G","H","I","J","K","L","M","N"];
        const lettersBottom = ["O","P","Q","R","S","T","U","V","W","X","Y","Z","1","2"];
        const allLetters = [...lettersTop, ...lettersBottom];
        const colorPairs = ['s-yellow', 's-red', 's-green', 's-purple', 's-blue', 'b-red-d-green', 'b-red-d-yellow', 'b-blue-d-green', 'b-purple-d-blue', 'b-green-d-yellow', 'b-green-d-red', 'b-yellow-d-blue', 'b-yellow-d-green', 'b-purple-d-yellow'];

        let currentMode = 'LOCATION', currentTarget = "", timer = 90, lives = 5, score = 1250, matchesFound = 0;
        let gameActive = false, firstCard = null, awaitingReset = false, interval = null, correctSequence = "";
        let stats = {}, roundStartTime = 0;

        function buildGrid() {
            const top = document.getElementById('top-row'), bot = document.getElementById('bottom-row'), statsBody = document.getElementById('stats-body');
            top.innerHTML = lettersTop.map(l => createItemHTML(l, 'top-label')).join('');
            bot.innerHTML = lettersBottom.map(l => createItemHTML(l, 'bot-label')).join('');
            allLetters.forEach(l => {
                const tr = document.createElement('tr'); tr.id = `stats-row-${l}`;
                tr.innerHTML = `<td>${l}</td><td class="avg">-</td><td class="count">0</td>`;
                statsBody.appendChild(tr);
                stats[l] = { times: [], row: tr, avgCell: tr.querySelector('.avg'), countCell: tr.querySelector('.count') };
            });
            document.querySelectorAll('.item').forEach(el => el.onclick = () => handleItemClick(el));
        }

        function createItemHTML(id, labelClass) {
            return `<div class="item" id="item-${id}"><div class="train-label ${labelClass}">${id}</div>${Array(9).fill('<div class="circle"></div>').join('')}</div>`;
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.id === 'nav-' + mode));
            document.getElementById('loc-stats-container').classList.toggle('hidden', mode !== 'LOCATION');
            document.getElementById('reset-btn').classList.add('hidden');
            document.getElementById('start-btn').classList.remove('hidden');
            resetBoard();
            if(mode === 'LOCATION') initMode();
        }

        function initMode() {
            resetBoard();
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('reset-btn').classList.remove('hidden');
            if (currentMode === 'LOCATION') startLocationRound();
            else if (currentMode === 'GAME') initGameMode();
            else if (currentMode === 'SEQUENCE') initSequenceMode();
        }

        function resetBoard() {
            clearInterval(interval);
            gameActive = false; awaitingReset = false; firstCard = null; lives = 5; score = 1250; matchesFound = 0;
            document.getElementById('feedback').innerText = "";
            document.getElementById('hearts-container').innerHTML = "";
            document.getElementById('stats-display').innerText = "";
            document.querySelectorAll('.item').forEach(i => {
                i.classList.remove('active-loc', 'matched');
                i.querySelectorAll('.circle').forEach(c => c.style.background = 'black');
            });
        }

        // --- LOCATION MODE ---
        function startLocationRound() {
            document.querySelectorAll('.item').forEach(i => i.classList.remove('active-loc'));
            currentTarget = allLetters[Math.floor(Math.random() * allLetters.length)];
            document.getElementById('item-' + currentTarget).classList.add('active-loc');
            document.getElementById('answer-input').focus();
            roundStartTime = performance.now();
        }

        function updateStats(char) {
            const duration = (performance.now() - roundStartTime) / 1000;
            const data = stats[char];
            data.times.push(duration);
            if (data.times.length > 5) data.times.shift();
            const avg = data.times.reduce((a, b) => a + b, 0) / data.times.length;
            data.avgCell.textContent = avg.toFixed(2) + 's';
            data.countCell.textContent = data.times.length;
            sortStatsTable();
        }

        function sortStatsTable() {
            const tbody = document.getElementById('stats-body'), rows = Array.from(tbody.querySelectorAll('tr'));
            rows.sort((a, b) => {
                const charA = a.id.split('-').pop(), charB = b.id.split('-').pop();
                const avgA = stats[charA].times.length >= 5 ? (stats[charA].times.reduce((s, t) => s + t, 0) / stats[charA].times.length) : -1;
                const avgB = stats[charB].times.length >= 5 ? (stats[charB].times.reduce((s, t) => s + t, 0) / stats[charB].times.length) : -1;
                return avgB - avgA;
            });
            rows.forEach((row, i) => {
                const char = row.id.split('-').pop();
                row.classList.toggle('weak-link', i < 13 && stats[char].times.length >= 5);
                tbody.appendChild(row);
            });
        }

        // --- GAME MODE (MEMORY) ---
        function initGameMode() {
            updateHearts();
            const shuffled = [...colorPairs, ...colorPairs].sort(() => Math.random() - 0.5);
            allLetters.forEach((l, i) => {
                const item = document.getElementById('item-' + l);
                item.dataset.color = shuffled[i];
                applyItemColor(item, shuffled[i]);
            });
            setTimeout(hideAllColors, 2000);
        }

        function handleItemClick(item) {
            if (currentMode === 'LOCATION' || awaitingReset || item.classList.contains('matched')) return;
            if (!gameActive) { gameActive = true; startTimer(); hideAllColors(); }
            
            applyItemColor(item, item.dataset.color);
            if (!firstCard) { firstCard = item; } 
            else if (firstCard !== item) {
                if (firstCard.dataset.color === item.dataset.color) {
                    item.classList.add('matched'); firstCard.classList.add('matched');
                    matchesFound++; firstCard = null;
                    if(matchesFound === 14) endGame(true);
                } else {
                    awaitingReset = true;
                    lives--; updateHearts();
                    setTimeout(() => {
                        if (lives <= 0) endGame(false);
                        else { applyItemColor(item, ''); applyItemColor(firstCard, ''); awaitingReset = false; firstCard = null; }
                    }, 800);
                }
            }
        }

        // --- SEQUENCE MODE ---
        function initSequenceMode() {
            const shuffled = [...colorPairs, ...colorPairs].sort(() => Math.random() - 0.5);
            allLetters.forEach((l, i) => {
                const item = document.getElementById('item-' + l);
                item.dataset.color = shuffled[i];
                applyItemColor(item, shuffled[i]);
            });
            const pairMap = {};
            allLetters.forEach(l => {
                const c = document.getElementById('item-' + l).dataset.color;
                if (!pairMap[c]) pairMap[c] = [];
                pairMap[c].push(l);
            });
            const seq = []; const used = new Set();
            for (let i = 0; i < 14; i++) {
                [lettersTop[i], lettersBottom[i]].forEach(l => {
                    const c = document.getElementById('item-' + l).dataset.color;
                    if (!used.has(c)) {
                        const p = pairMap[c];
                        seq.push(p[0] === l ? p[1] : p[0]);
                        used.add(c);
                    }
                });
            }
            correctSequence = seq.slice(0, 6).join("");
            console.log("Goal:", correctSequence); // Debug
        }

        // --- UTILS ---
        function applyItemColor(item, type) {
            const circles = item.querySelectorAll('.circle');
            circles.forEach(c => c.style.background = 'black');
            if (!type) return;
            if (type.startsWith('s-')) {
                circles.forEach(c => c.style.background = type.split('-')[1]);
            } else {
                const p = type.split('-');
                circles.forEach((c, i) => c.style.background = (i === 4) ? p[3] : p[1]);
            }
        }

        function hideAllColors() { document.querySelectorAll('.item').forEach(i => applyItemColor(i, '')); }
        
        function updateHearts() {
            const container = document.getElementById('hearts-container');
            container.innerHTML = Array(5).fill(0).map((_, i) => `<span class="heart ${i >= lives ? 'lost' : ''}">❤</span>`).join('');
        }

        function startTimer() {
            interval = setInterval(() => {
                timer--;
                document.getElementById('stats-display').innerText = `TIME: ${timer}s | SCORE: ${score}`;
                if (timer <= 0) endGame(false);
            }, 1000);
        }

        function endGame(win) {
            clearInterval(interval);
            document.getElementById('feedback').innerText = win ? "WINNER! 🏆" : "GAME OVER 💀";
            document.getElementById('feedback').style.color = win ? "var(--green)" : "var(--red)";
        }

        document.getElementById('answer-input').oninput = (e) => {
            const val = e.target.value.toUpperCase().trim();
            if (currentMode === 'LOCATION' && val === currentTarget) {
                updateStats(currentTarget);
                e.target.value = ""; startLocationRound();
            } else if (currentMode === 'SEQUENCE' && val.length === 6) {
                if (val === correctSequence) endGame(true); else endGame(false);
                e.target.value = "";
            }
        };

        function toggleSetting(cls, el) { document.body.classList.toggle(cls, el.checked); }

        buildGrid();
    </script>
</body>
</html>
