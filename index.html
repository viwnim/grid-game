<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Pro: Location & Game</title>
    <style>
        :root {
            --bg: #121212;
            --sidebar: #1e1e1e;
            --accent: #007bff;
        }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        
        /* Sidebar Navigation */
        #sidebar { width: 200px; background: var(--sidebar); display: flex; flex-direction: column; padding: 20px; border-right: 1px solid #333; }
        .nav-btn { padding: 15px; margin-bottom: 10px; cursor: pointer; background: #2a2a2a; border: none; color: #888; border-radius: 8px; font-weight: bold; text-align: left; transition: 0.3s; }
        .nav-btn.active { background: var(--accent); color: white; }
        
        /* Main Area */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* Shared Grid Styling */
        #game-container { display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px; }
        .row { display: flex; gap: 8px; }
        .item { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; width: 45px; height: 45px; border: 1px solid white; padding: 3px; background: black; cursor: pointer; transition: 0.2s; position: relative; }
        .circle { border-radius: 50%; background: black; border: 1px solid #333; width: 100%; height: 100%; box-sizing: border-box; pointer-events: none; }
        
        /* Location Mode Classes */
        .item.active-loc { background: blue !important; border-color: cyan; }
        .item.active-loc .circle { background: blue !important; border-color: white; }
        
        /* UI Elements */
        #hud { margin-bottom: 20px; display: flex; gap: 30px; font-size: 1.2rem; font-family: monospace; }
        #controls { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        input { padding: 10px; font-size: 1.5rem; width: 80px; text-align: center; border-radius: 8px; background: white; color: black; border: none; }
        button#start-btn { padding: 12px 40px; font-size: 1.2rem; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; }
        #feedback { font-size: 3rem; height: 3.5rem; }
        .hidden { display: none !important; }
        .invisible { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="font-size: 1rem; color: #555; margin-bottom: 20px;">MODES</h2>
        <button class="nav-btn active" onclick="switchMode('LOCATION')">LOCATION</button>
        <button class="nav-btn" onclick="switchMode('GAME')">GAME</button>
    </div>

    <div id="main-content">
        <!-- HUD for Game Mode -->
        <div id="hud" class="hidden">
            <div>TIME: <span id="timer">90</span>s</div>
            <div>LIVES: <span id="lives">5</span></div>
            <div>SCORE: <span id="score">0</span></div>
        </div>

        <!-- Mode Selector for Location -->
        <div id="loc-subnav" style="margin-bottom: 20px;">
            <button id="btn-let" onclick="setLocType('LET')" style="background:var(--accent); color:white; border:none; padding:5px 15px; border-radius:4px; cursor:pointer;">LET</button>
            <button id="btn-num" onclick="setLocType('NUM')" style="background:#444; color:white; border:none; padding:5px 15px; border-radius:4px; cursor:pointer;">NUM</button>
        </div>

        <div id="game-container">
            <div class="row" id="top-row"></div>
            <div class="row" id="bottom-row"></div>
        </div>

        <div id="controls">
            <div id="feedback"></div>
            <div id="loc-input-area">
                <input type="text" id="answer-input" placeholder="?">
            </div>
            <button id="start-btn" class="hidden" onclick="initGameMode()">START GAME</button>
        </div>
    </div>

    <script>
        let currentMode = 'LOCATION';
        let locType = 'LET';
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ12".split("");
        
        // Game State
        let timer = 90;
        let lives = 5;
        let gameActive = false;
        let firstCard = null;
        let matchesFound = 0;
        let interval;

        const colorPairs = [
            'solid-yellow', 'solid-red', 'solid-green', 'solid-purple', 'solid-blue',
            'border-red-dot-green', 'border-red-dot-yellow', 'border-blue-dot-green',
            'border-purple-dot-blue', 'border-green-dot-yellow', 'border-green-dot-red',
            'border-yellow-dot-blue', 'border-yellow-dot-green', 'border-red-dot-green-2'
        ];

        function buildGrid() {
            const top = document.getElementById('top-row');
            const bottom = document.getElementById('bottom-row');
            top.innerHTML = ''; bottom.innerHTML = '';

            letters.forEach((l, i) => {
                const item = document.createElement('div');
                item.className = 'item';
                item.id = `item-${l}`;
                item.dataset.letter = l;
                item.dataset.num = (i % 14) + 1;
                for(let j=0; j<9; j++) item.appendChild(document.createElement('div')).className = 'circle';
                
                item.onclick = () => handleItemClick(item);
                (i < 14 ? top : bottom).appendChild(item);
            });
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.innerText === mode));
            document.getElementById('loc-subnav').classList.toggle('hidden', mode === 'GAME');
            document.getElementById('loc-input-area').classList.toggle('hidden', mode === 'GAME');
            document.getElementById('start-btn').classList.toggle('hidden', mode === 'LOCATION');
            document.getElementById('hud').classList.toggle('hidden', mode === 'LOCATION');
            resetBoard();
            if(mode === 'LOCATION') startLocationRound();
        }

        // --- LOCATION MODE LOGIC ---
        let currentTarget = "";
        function setLocType(type) {
            locType = type;
            document.getElementById('btn-let').style.background = type === 'LET' ? 'var(--accent)' : '#444';
            document.getElementById('btn-num').style.background = type === 'NUM' ? 'var(--accent)' : '#444';
            startLocationRound();
        }
        function startLocationRound() {
            resetBoard();
            currentTarget = letters[Math.floor(Math.random() * letters.length)];
            const el = document.getElementById(`item-${currentTarget}`);
            el.classList.add('active-loc');
            document.getElementById('answer-input').focus();
        }

        // --- GAME MODE LOGIC ---
        function initGameMode() {
            gameActive = false;
            timer = 90; lives = 5; matchesFound = 0;
            clearInterval(interval);
            updateHUD();
            
            const shuffled = [...colorPairs, ...colorPairs].sort(() => Math.random() - 0.5);
            document.querySelectorAll('.item').forEach((item, i) => {
                item.classList.remove('invisible', 'active-loc');
                item.dataset.color = shuffled[i];
                applyColor(item, shuffled[i]);
            });
            document.getElementById('start-btn').classList.add('hidden');
        }

        function handleItemClick(item) {
            if(currentMode === 'LOCATION') return;
            if(!gameActive) { startTimer(); hideAllColors(); gameActive = true; }
            if(item.classList.contains('invisible') || item === firstCard) return;

            showColor(item);

            if(!firstCard) {
                firstCard = item;
            } else {
                if(firstCard.dataset.color === item.dataset.color) {
                    setTimeout(() => {
                        firstCard.classList.add('invisible');
                        item.classList.add('invisible');
                        firstCard = null;
                        matchesFound++;
                        if(matchesFound === 14) endGame(true);
                    }, 300);
                } else {
                    lives--;
                    updateHUD();
                    flashBoard();
                    if(lives <= 0) endGame(false);
                    firstCard = null;
                }
            }
        }

        function applyColor(item, type) {
            const circles = item.querySelectorAll('.circle');
            circles.forEach(c => { c.style.background = 'black'; c.style.borderColor = '#333'; });
            item.style.background = 'black';

            if(type.startsWith('solid')) {
                const color = type.split('-')[1];
                item.style.background = color;
                circles.forEach(c => { c.style.background = color; c.style.borderColor = 'white'; });
            } else {
                const parts = type.split('-');
                const border = parts[1];
                const dot = parts[3];
                circles.forEach((c, i) => {
                    c.style.borderColor = border;
                    if(i === 4) c.style.background = dot;
                });
            }
        }

        function hideAllColors() {
            document.querySelectorAll('.item').forEach(item => {
                item.style.background = 'black';
                item.querySelectorAll('.circle').forEach(c => {
                    c.style.background = 'black';
                    c.style.borderColor = '#333';
                });
            });
        }

        function showColor(item) { applyColor(item, item.dataset.color); }

        function flashBoard() {
            document.querySelectorAll('.item').forEach(item => { if(!item.classList.contains('invisible')) showColor(item); });
            setTimeout(() => { if(gameActive) hideAllColors(); }, 1000);
        }

        function startTimer() {
            interval = setInterval(() => {
                timer--;
                updateHUD();
                if(timer <= 0) endGame(false);
            }, 1000);
        }

        function updateHUD() {
            document.getElementById('timer').innerText = timer;
            document.getElementById('lives').innerText = lives;
        }

        function endGame(win) {
            gameActive = false;
            clearInterval(interval);
            const score = win ? Math.round(1000 * (timer / 90) + (50 * lives)) : 0;
            alert(win ? `WINNER! Score: ${score}` : "GAME OVER");
            document.getElementById('start-btn').classList.remove('hidden');
        }

        function resetBoard() {
            clearInterval(interval);
            document.querySelectorAll('.item').forEach(item => {
                item.classList.remove('invisible', 'active-loc');
                item.style.background = 'black';
                item.querySelectorAll('.circle').forEach(c => {
                    c.style.background = 'black';
                    c.style.borderColor = '#333';
                });
            });
        }

        // Input Listener for Location Mode
        document.getElementById('answer-input').onkeyup = (e) => {
            if(e.key === 'Enter') {
                const val = e.target.value.toUpperCase();
                const item = document.getElementById(`item-${currentTarget}`);
                const isCorrect = locType === 'LET' ? val === currentTarget : val === item.dataset.num;
                
                const fb = document.getElementById('feedback');
                fb.innerText = isCorrect ? "✔" : "✘";
                fb.className = isCorrect ? "correct" : "wrong";
                if(isCorrect) setTimeout(startLocationRound, 600);
                e.target.value = "";
            }
        };

        buildGrid();
        switchMode('LOCATION');
    </script>
</body>
</html>
