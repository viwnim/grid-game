<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Game</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #mode-selector { margin-bottom: 20px; display: flex; background: #2a2a2a; padding: 5px; border-radius: 8px; }
        .mode-btn { padding: 8px 20px; cursor: pointer; background: transparent; border: none; color: #888; font-weight: bold; }
        .mode-btn.active { background: #007bff; color: white; border-radius: 6px; }
        #game-container { display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px; }
        .row { display: flex; gap: 8px; }
        .item { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; width: 40px; height: 40px; border: 1px solid white; padding: 2px; background: black; }
        .circle { border-radius: 50%; background: black; border: 1px solid #333; width: 100%; height: 100%; box-sizing: border-box; }
        .item.active { background: blue !important; border-color: cyan; }
        .item.active .circle { background: blue !important; border: 1px solid white; }
        #controls { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        input { padding: 10px; font-size: 1.5rem; width: 80px; text-align: center; border-radius: 8px; }
        #feedback { font-size: 3rem; height: 3.5rem; }
        .correct { color: #28a745; }
        .wrong { color: #dc3545; }
    </style>
</head>
<body>
    <div id="mode-selector">
        <button id="btn-let" class="mode-btn active">LET</button>
        <button id="btn-num" class="mode-btn">NUM</button>
    </div>
    <div id="game-container">

            <!-- 14 static items -->

            <div class="item" id="item-B" data-num="2"><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div></div>

            <div class="item" id="item-D" data-num="4"><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div></div>
            <div class="item" id="item-E" data-num="5"><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div></div>
            <div class="item" id="item-F" data-num="6"><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div></div>
            <div class="item" id="item-G" data-num="7"><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div></div>
            <div class="item" id="item-H" data-num="8"><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div></div>

            <div class="item" id="item-K" data-num="11"><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div></div>

        </div>

            <div class="item" id="item-P" data-num="2"><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div></div>
            <div class="item" id="item-Q" data-num="3"><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div></div>

            <div class="item" id="item-X" data-num="10"><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div></div>

            <div class="item" id="item-2" data-num="14"><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div></div>
        </div>
    </div>
    <div id="controls">
        <div id="feedback"></div>
        <input type="text" id="answer-input" placeholder="?">
        <button id="go-btn" onclick="startGame()">GO</button>
    </div>
    <script>
        let currentMode = 'LET';
        let currentTargetLetter = "";
        let currentTargetIndex = "";
        const allKeys = "ABCDEFGHIJKLMNOPQRSTUVWXYZ12".split("");

        function startGame() {
            document.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
            document.getElementById('feedback').textContent = "";
            const input = document.getElementById('answer-input');
            input.value = "";
            input.focus();
            currentTargetLetter = allKeys[Math.floor(Math.random() * allKeys.length)];
            const activeEl = document.getElementById(`item-${currentTargetLetter}`);
            activeEl.classList.add('active');
            currentTargetIndex = activeEl.dataset.num;
        }

        function checkAnswer() {
            const val = document.getElementById('answer-input').value.trim().toUpperCase();
            if (!val) return;
            const isCorrect = (currentMode === 'LET') ? (val === currentTargetLetter) : (val === currentTargetIndex);
            const fb = document.getElementById('feedback');
            if (isCorrect) {
                fb.textContent = "✔"; fb.className = "correct";
                setTimeout(startGame, 600);
            } else {
                fb.textContent = "✘"; fb.className = "wrong";
                document.getElementById('answer-input').value = "";
            }
        }

        document.getElementById('btn-let').onclick = function() {
            currentMode = 'LET'; this.classList.add('active');
            document.getElementById('btn-num').classList.remove('active');
            startGame();
        };
        document.getElementById('btn-num').onclick = function() {
            currentMode = 'NUM'; this.classList.add('active');
            document.getElementById('btn-let').classList.remove('active');
            startGame();
        };
        document.getElementById('answer-input').onkeyup = (e) => { if (e.key === 'Enter') checkAnswer(); };
        window.onload = startGame;
    </script>
</body>
</html>
